name: ✨ Feature request
description: Suggest a new capability or improvement for FLOW.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. For open-ended ideas or questions, a [Discussion](https://github.com/dominikkoenitzer/Flow/discussions) is often a better fit than an issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or the pain point. What are you trying to do?
      placeholder: I want to ... but currently FLOW ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like FLOW to do?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Recording
        - Playback
        - Auto-clicker
        - Hotkeys
        - UI / rendering
        - Save / load macro (.rec)
        - Settings / persistence
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you thought about.
    validations:
      required: false
